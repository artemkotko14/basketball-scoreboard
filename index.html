<html>

<head>
    <link rel="stylesheet" href="./styles/index.css">
    <link rel="stylesheet" href="./styles/reset.css">
</head>

<body>
    <div class="container">
        <div class="scores">
            <div class="team-score" id="home-half">
                <h3 class="title">HOME</h3>
                <div class="score"><span id="home-score">0</span></div>
                <div class="btn-wrapper">
                    <button class="btn btn-plus plus-one ">+1</button>
                    <button class="btn btn-plus plus-two">+2</button>
                    <button class="btn btn-plus plus-three">+3</button>
                </div>
            </div>
            <div class="team-score" id="guest-half">
                <h3 class="title">GUEST</h3>
                <div class="score">
                    <span id="guest-score">0</span>
                </div>
                <div class="btn-wrapper">
                    <button class="btn btn-plus plus-one">+1</button>
                    <button class="btn btn-plus plus-two">+2</button>
                    <button class="btn btn-plus plus-three">+3</button>
                </div>
            </div>
        </div>
        <div class="restart-btn-wrapper">
            <button class="btn restart">Restart Game</button>
        </div>
    </div>
    <script src="./index.js"></script>
</body>

</html>
